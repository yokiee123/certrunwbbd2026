<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Certificate Generator</title>

  <!-- html2canvas for downloading the certificate as image -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      text-align: center;
      padding: 30px;
      margin: 0;
    }

    h1 {
      color: #333;
      margin-bottom: 5px;
    }

    p {
      color: #555;
    }

    input {
      padding: 12px;
      width: 300px;
      max-width: 90%;
      font-size: 18px;
      margin-bottom: 15px;
      border: 1px solid #aaa;
      border-radius: 6px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      background: maroon;
      color: white;
      border: none;
      border-radius: 6px;
      margin: 5px;
    }

    button:hover {
      background: #6f0000;
    }

    #warning {
      display: none;
      max-width: 800px;
      margin: 15px auto;
      padding: 12px;
      background: #ffe0e0;
      color: #8b0000;
      border: 1px solid #cc0000;
      border-radius: 6px;
      font-weight: bold;
    }

    #certificate {
      position: relative;
      width: 1000px;
      max-width: 100%;
      margin: 25px auto;
      background: white;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    #certificate img {
      width: 100%;
      display: block;
    }

    #certName {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 46px;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: bold;
      color: #111;
      width: 80%;
      text-align: center;
      white-space: normal;
      word-wrap: break-word;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .controls,
      h1,
      p,
      #warning {
        display: none;
      }

      #certificate {
        box-shadow: none;
        margin: 0 auto;
        width: 100%;
      }
    }

    @media screen and (max-width: 768px) {
      body {
        padding: 15px;
      }

      #certName {
        font-size: 28px;
      }

      button {
        width: 90%;
        max-width: 320px;
      }
    }

    @media screen and (max-width: 480px) {
      #certName {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <h1>Certificate Generator</h1>
  <p>Enter your full name below:</p>

  <div class="controls">
    <input type="text" id="fullName" placeholder="Type your full name">
    <br>
    <button onclick="generateCertificate()">Generate Certificate</button>
    <button onclick="downloadCertificate()">Download Certificate</button>
  </div>

  <div id="warning">
    Certificate background not found. Please check if the file is named exactly:
    <br>
    certificate-bg.png
    <br>
    and placed beside index.html.
  </div>

  <div id="certificate">
    <img 
      id="certificateImage"
      src="./certificate-bg.png" 
      alt="Certificate Background"
      onerror="showImageError()"
      onload="hideImageError()"
    >
    <div id="certName">Your Name Here</div>
  </div>

  <script>
    function showImageError() {
      document.getElementById("warning").style.display = "block";
    }

    function hideImageError() {
      document.getElementById("warning").style.display = "none";
    }

    function generateCertificate() {
      const nameInput = document.getElementById("fullName");
      const name = nameInput.value.trim();

      if (!name) {
        alert("Please enter your full name.");
        nameInput.focus();
        return;
      }

      document.getElementById("certName").textContent = name.toUpperCase();
    }

    function downloadCertificate() {
      const name = document.getElementById("fullName").value.trim();
      const certificate = document.getElementById("certificate");
      const image = document.getElementById("certificateImage");

      if (!name) {
        alert("Please enter your full name first.");
        document.getElementById("fullName").focus();
        return;
      }

      if (!image.complete || image.naturalWidth === 0) {
        alert("Certificate background image is not loaded. Please check the file name and location.");
        return;
      }

      document.getElementById("certName").textContent = name.toUpperCase();

      html2canvas(certificate, {
        scale: 3,
        useCORS: true,
        backgroundColor: null
      }).then(canvas => {
        const link = document.createElement("a");

        const cleanName = name
          .replace(/[^a-z0-9]/gi, "_")
          .toLowerCase();

        link.download = "certificate_" + cleanName + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>

</body>
</html>
